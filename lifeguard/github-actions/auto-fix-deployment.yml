# SwiftList Lifeguard - Auto-Fix Deployment Workflow
#
# This workflow is triggered by the Slack button handler Lambda when Rick approves a fix.
# It applies the proposed fix, runs tests, and deploys to production.

name: Lifeguard Auto-Fix Deployment

on:
  workflow_dispatch:
    inputs:
      alarm_name:
        description: 'Name of the CloudWatch alarm that triggered this fix'
        required: true
        type: string

      proposed_fix:
        description: 'Description of the proposed fix'
        required: true
        type: string

      code_diff:
        description: 'Code changes in diff format (if applicable)'
        required: false
        type: string

      urgency:
        description: 'Urgency level (critical/high/medium/low)'
        required: true
        type: choice
        options:
          - critical
          - high
          - medium
          - low

      approved_by:
        description: 'Slack username of approver'
        required: true
        type: string

      analysis_id:
        description: 'Unique ID for this analysis'
        required: true
        type: string

jobs:
  validate-and-test:
    name: Validate Fix & Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci
          cd apps/swiftlist-app && npm ci
          cd ../swiftlist-marketing && npm ci

      - name: Apply Code Changes (if applicable)
        if: ${{ inputs.code_diff != '' }}
        run: |
          echo "Applying code diff..."
          echo "${{ inputs.code_diff }}" > /tmp/fix.patch

          # Try to apply patch
          if git apply --check /tmp/fix.patch; then
            git apply /tmp/fix.patch
            echo "✅ Patch applied successfully"
          else
            echo "❌ Patch failed to apply cleanly"
            exit 1
          fi

      - name: Run Linter
        run: |
          cd apps/swiftlist-app
          npm run lint || true  # Don't fail on lint warnings

      - name: Run Type Check
        run: |
          cd apps/swiftlist-app
          npm run type-check || npx tsc --noEmit

      - name: Run Unit Tests
        run: |
          cd apps/swiftlist-app
          npm run test || echo "⚠️ No unit tests configured yet"

      - name: Build Application
        run: |
          cd apps/swiftlist-app
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://swiftlist.app

      - name: Run Integration Tests (if applicable)
        run: |
          cd apps/swiftlist-app
          # npm run test:integration || echo "⚠️ No integration tests yet"
          echo "⚠️ Integration tests not implemented yet"

      - name: Security Scan
        run: |
          npm audit --audit-level=high || echo "⚠️ Security vulnerabilities found, review required"

  deploy-to-production:
    name: Deploy Fix to Production
    needs: validate-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production  # Requires manual approval in GitHub if configured

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci
          cd apps/swiftlist-app && npm ci

      - name: Apply Code Changes
        if: ${{ inputs.code_diff != '' }}
        run: |
          echo "${{ inputs.code_diff }}" > /tmp/fix.patch
          git apply /tmp/fix.patch

      - name: Create Git Commit
        if: ${{ inputs.code_diff != '' }}
        run: |
          git config --global user.name 'SwiftList Lifeguard'
          git config --global user.email 'lifeguard@swiftlist.app'

          git add .
          git commit -m "🤖 Auto-fix: ${{ inputs.alarm_name }}

          Proposed Fix: ${{ inputs.proposed_fix }}
          Urgency: ${{ inputs.urgency }}
          Approved by: ${{ inputs.approved_by }}
          Analysis ID: ${{ inputs.analysis_id }}

          🤖 Generated with SwiftList Lifeguard AI
          Co-Authored-By: ${{ inputs.approved_by }} <${{ inputs.approved_by }}@swiftlist.app>"

      - name: Push to Main Branch
        if: ${{ inputs.code_diff != '' }}
        run: |
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger AWS Amplify Build
        run: |
          # AWS Amplify auto-deploys on push to main
          # Alternatively, trigger manually via AWS CLI:
          # aws amplify start-job --app-id $APP_ID --branch-name main --job-type RELEASE
          echo "✅ Amplify will auto-deploy on git push"

      - name: Wait for Deployment
        run: |
          echo "Waiting for Amplify deployment to complete..."
          sleep 60  # Wait 1 minute for deployment to start

          # Poll Amplify deployment status (simplified)
          # In production, use AWS CLI to check actual deployment status
          echo "⏳ Deployment in progress..."

      - name: Run Smoke Tests
        run: |
          echo "Running smoke tests against production..."

          # Test critical endpoints
          response=$(curl -s -o /dev/null -w "%{http_code}" https://swiftlist.app/api/health)
          if [ "$response" = "200" ]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed with status: $response"
            exit 1
          fi

          # Test auth endpoint
          response=$(curl -s -o /dev/null -w "%{http_code}" https://swiftlist.app/api/auth/status)
          if [ "$response" = "200" ]; then
            echo "✅ Auth endpoint responsive"
          else
            echo "❌ Auth endpoint failed with status: $response"
            exit 1
          fi

      - name: Verify CloudWatch Alarm Cleared
        run: |
          echo "Checking if alarm has cleared..."
          # In production, use AWS CLI to check alarm state
          # aws cloudwatch describe-alarms --alarm-names "${{ inputs.alarm_name }}"
          echo "⏳ Monitoring alarm state for 5 minutes..."

  notify-slack:
    name: Notify Slack of Deployment Status
    needs: [validate-and-test, deploy-to-production]
    runs-on: ubuntu-latest
    if: always()  # Run even if previous jobs fail

    steps:
      - name: Send Success Notification
        if: ${{ needs.deploy-to-production.result == 'success' }}
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "channel": "#swiftlist-alerts",
              "username": "SwiftList Lifeguard",
              "icon_emoji": ":white_check_mark:",
              "text": "✅ *Fix Deployed Successfully*",
              "attachments": [{
                "color": "#00cc00",
                "title": "Auto-Fix Deployment Complete",
                "fields": [
                  {
                    "title": "Alarm",
                    "value": "${{ inputs.alarm_name }}",
                    "short": true
                  },
                  {
                    "title": "Approved By",
                    "value": "@${{ inputs.approved_by }}",
                    "short": true
                  },
                  {
                    "title": "Urgency",
                    "value": "${{ inputs.urgency }}",
                    "short": true
                  },
                  {
                    "title": "Deploy Time",
                    "value": "${{ job.duration }} seconds",
                    "short": true
                  },
                  {
                    "title": "Proposed Fix",
                    "value": "${{ inputs.proposed_fix }}",
                    "short": false
                  },
                  {
                    "title": "Verification",
                    "value": "✓ All tests passing\n✓ Health checks OK\n✓ Smoke tests passed",
                    "short": false
                  },
                  {
                    "title": "GitHub Commit",
                    "value": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|View Changes>",
                    "short": false
                  }
                ],
                "footer": "Deployed via SwiftList Lifeguard AI",
                "footer_icon": "https://platform.slack-edge.com/img/default_application_icon.png"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send Failure Notification
        if: ${{ needs.deploy-to-production.result == 'failure' }}
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "channel": "#swiftlist-alerts",
              "username": "SwiftList Lifeguard",
              "icon_emoji": ":x:",
              "text": "❌ *Auto-Fix Deployment Failed*",
              "attachments": [{
                "color": "#ff0000",
                "title": "Deployment Failed - Manual Intervention Required",
                "fields": [
                  {
                    "title": "Alarm",
                    "value": "${{ inputs.alarm_name }}",
                    "short": true
                  },
                  {
                    "title": "Approved By",
                    "value": "@${{ inputs.approved_by }}",
                    "short": true
                  },
                  {
                    "title": "Failure Reason",
                    "value": "Check GitHub Actions logs for details",
                    "short": false
                  },
                  {
                    "title": "Actions Logs",
                    "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>",
                    "short": false
                  },
                  {
                    "title": "Next Steps",
                    "value": "1. Review logs\n2. Fix issues manually\n3. Deploy via standard process",
                    "short": false
                  }
                ],
                "footer": "SwiftList Lifeguard AI",
                "footer_icon": "https://platform.slack-edge.com/img/default_application_icon.png"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  rollback-on-failure:
    name: Automatic Rollback (if deployment fails)
    needs: deploy-to-production
    runs-on: ubuntu-latest
    if: failure()  # Only run if deployment failed

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Revert Last Commit
        run: |
          git config --global user.name 'SwiftList Lifeguard'
          git config --global user.email 'lifeguard@swiftlist.app'

          echo "Reverting failed auto-fix commit..."
          git revert HEAD --no-edit
          git push origin main

      - name: Notify Slack of Rollback
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "channel": "#swiftlist-alerts",
              "username": "SwiftList Lifeguard",
              "icon_emoji": ":leftwards_arrow_with_hook:",
              "text": "↩️ *Automatic Rollback Executed*",
              "attachments": [{
                "color": "#ff6600",
                "title": "Deployment failed - changes reverted",
                "text": "The auto-fix for ${{ inputs.alarm_name }} failed validation and has been automatically rolled back.",
                "fields": [
                  {
                    "title": "Status",
                    "value": "✅ Rollback complete - system restored to previous state",
                    "short": false
                  }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
