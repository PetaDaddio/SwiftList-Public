# Railway Configuration for SwiftList Core Engine
# Deployment settings for BullMQ workers

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 10

# Resource allocation
[deploy.resources]
memory = 512 # MB (adjust based on load)
cpu = 1 # vCPUs

# Auto-scaling (Railway Pro only)
[deploy.autoscaling]
enabled = true
minReplicas = 1
maxReplicas = 5
targetCPU = 70 # Scale up when CPU > 70%
targetMemory = 80 # Scale up when memory > 80%

# Environment variables (set in Railway Dashboard)
[env]
NODE_ENV = "production"

# Redis connection (Railway plugin provides REDIS_URL)
REDIS_URL = "${{Redis.REDIS_URL}}"

# Replicate API
REPLICATE_API_TOKEN = "${{REPLICATE_API_TOKEN}}"

# Anthropic Claude API
ANTHROPIC_API_KEY = "${{ANTHROPIC_API_KEY}}"

# Google Gemini API
GOOGLE_API_KEY = "${{GOOGLE_API_KEY}}"

# OpenAI API
OPENAI_API_KEY = "${{OPENAI_API_KEY}}"

# Supabase
SUPABASE_URL = "${{SUPABASE_URL}}"
SUPABASE_SERVICE_ROLE_KEY = "${{SUPABASE_SERVICE_ROLE_KEY}}"

# Sentry (error tracking)
SENTRY_DSN = "${{SENTRY_DSN}}"

# Worker configuration
WORKER_CONCURRENCY = "5"
MAX_RETRIES = "3"
ENABLE_TELEMETRY = "true"
